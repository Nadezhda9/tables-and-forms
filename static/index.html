<!DOCTYPE html>
    <html lang="ru">

    <head>
        <meta charset="UTF-8">
        <title>Форма выбора питомца</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <main>
            <h1>Найди себе друга!</h1>

            <form action="/pets/orders" method="POST">

                <label for="petType">Тип питомца:</label>
                <select id="petType" name="petType">
                    <option value="cat" selected>Кот</option>
                    <option value="dog">Собака</option>
                    <option value="bird">Птица</option>
                </select>
                <br><br>

                <label for="pet-name">Кличка питомца:</label>
                <input type="text" id="pet-name" name="name" placeholder="Барсик" value="Барсик">
                <br><br>

                <label>Пол:</label>
                <label><input type="radio" name="gender" value="boy" checked> Мальчик</label>
                <label><input type="radio" name="gender" value="girl"> Девочка</label>
                <label><input type="radio" name="gender" value="none"> Не указан</label>
                <br><br>

                <label for="eyeColor">Цвет глаз:</label>
                <input type="color" id="eyeColor" name="eyeColor" value="#4287f5">
                <br><br>

                <label for="tailLength">Длина хвоста (см):</label>
                <input type="number" id="tailLength" name="tailLength" placeholder="25" value="25" min="0">
                <br><br>

            </form>
        </main>
    </body>

    </html>
